name: Build Waduk Browser Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq apktool zipalign apksigner openjdk-11-jdk

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir -p build

      - name: Download latest Kiwi APK
        run: |
          URL=$(curl -s https://api.github.com/repos/kiwibrowser/src.next/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          if [ -z "$URL" ]; then
            echo "Error: Gagal mendapatkan URL APK"
            exit 1
          fi
          echo "Download dari: $URL"
          wget -O build/kiwi.apk "$URL"

      - name: Decode APK with apktool
        run: |
          apktool d build/kiwi.apk -o build/src

      - name: Change app name (strings.xml)
        run: |
          # Ganti nama aplikasi di strings.xml
          find build/src -name "strings.xml" -exec sed -i 's/Kiwi Browser/Waduk Browser/g' {} \; || true
          # Ganti juga mungkin di arrays.xml atau file lain
          find build/src -name "*.xml" -exec sed -i 's/Kiwi Browser/Waduk Browser/g' {} \; || true

      - name: Change package name
        run: |
          # Ubah package name di AndroidManifest.xml
          sed -i 's/package="com.kiwibrowser.browser"/package="com.wadukbrowser.app"/g' build/src/AndroidManifest.xml
          # Pindahkan folder smali sesuai package baru
          OLD_PATH="build/src/smali/com/kiwibrowser/browser"
          NEW_PATH="build/src/smali/com/wadukbrowser/app"
          if [ -d "$OLD_PATH" ]; then
            mkdir -p "$(dirname "$NEW_PATH")"
            mv "$OLD_PATH" "$NEW_PATH"
          fi
          # Ganti referensi package di semua file smali
          find build/src/smali -type f -name "*.smali" -exec sed -i 's/com\/kiwibrowser\/browser/com\/wadukbrowser\/app/g' {} \; || true
          find build/src/smali -type f -name "*.smali" -exec sed -i 's/com.kiwibrowser.browser/com.wadukbrowser.app/g' {} \; || true

      - name: Replace icons
        run: |
          if [ -f icon.png ]; then
            echo "Mengganti icon dengan icon.png"
            # Ganti semua ukuran icon launcher
            find build/src/res -type f -name "ic_launcher.png" -exec cp icon.png {} \; || true
            find build/src/res -type f -name "ic_launcher_round.png" -exec cp icon.png {} \; || true
          else
            echo "File icon.png tidak ditemukan, skip ganti icon"
          fi

      - name: Replace splash screen (optional)
        run: |
          if [ -f splash.png ]; then
            echo "Mengganti splash screen"
            find build/src/res -type f -name "splash.png" -exec cp splash.png {} \; || true
          fi

      - name: Rebuild APK
        run: |
          apktool b build/src -o build/waduk-unsigned.apk

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore build/key.jks \
            -alias waduk \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password \
            -keypass password \
            -dname "CN=Waduk Browser,O=Android,C=ID"

      - name: Align APK
        run: |
          zipalign -f 4 build/waduk-unsigned.apk build/waduk-aligned.apk

      - name: Sign APK
        run: |
          apksigner sign \
            --ks build/key.jks \
            --ks-pass pass:password \
            --key-pass pass:password \
            build/waduk-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waduk-browser
          path: build/waduk-aligned.apk
