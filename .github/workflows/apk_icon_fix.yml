name: Build Waduk Browser Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq unzip zipalign apksigner openjdk-11-jdk

      - name: Install latest Apktool
        run: |
          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          chmod +x apktool
          sudo mv apktool_2.9.3.jar /usr/local/bin/apktool.jar
          sudo mv apktool /usr/local/bin/
          apktool --version

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir -p build

      - name: Download latest Kiwi APK
        run: |
          URL=$(curl -s https://api.github.com/repos/kiwibrowser/src.next/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          if [ -z "$URL" ]; then
            echo "Error: Gagal mendapatkan URL APK"
            exit 1
          fi
          echo "Mengunduh dari: $URL"
          wget -O build/kiwi.apk "$URL"

      - name: Decode APK without decoding resources (avoid compile errors)
        run: |
          apktool d -r build/kiwi.apk -o build/src

      - name: Change package name
        run: |
          # Ubah package name di AndroidManifest
          sed -i 's/package="com.kiwibrowser.browser"/package="com.wadukbrowser.app"/g' build/src/AndroidManifest.xml
          # Ubah referensi package di smali (jika ada)
          if [ -d "build/src/smali" ]; then
            find build/src/smali -type f -name "*.smali" -exec sed -i 's/com\/kiwibrowser\/browser/com\/wadukbrowser\/app/g' {} \; || true
            find build/src/smali -type f -name "*.smali" -exec sed -i 's/com.kiwibrowser.browser/com.wadukbrowser.app/g' {} \; || true
          fi

      - name: Change app label in manifest
        run: |
          # Ubah label aplikasi (nama yang muncul di launcher)
          sed -i 's/android:label="[^"]*"/android:label="Waduk Browser"/g' build/src/AndroidManifest.xml
          sed -i "s/android:label='[^']*'/android:label='Waduk Browser'/g" build/src/AndroidManifest.xml

      - name: Replace icons
        run: |
          if [ -f icon.png ]; then
            echo "Mengganti icon dengan icon.png"
            find build/src/res -type f -name "ic_launcher.png" -exec cp icon.png {} \; || true
            find build/src/res -type f -name "ic_launcher_round.png" -exec cp icon.png {} \; || true
          else
            echo "File icon.png tidak ditemukan, icon tidak diganti"
          fi

      - name: Replace splash screen
        run: |
          if [ -f splash.png ]; then
            echo "Mengganti splash screen"
            find build/src/res -type f -name "splash.png" -exec cp splash.png {} \; || true
          fi

      - name: Rebuild APK (without recompiling resources)
        run: |
          apktool b build/src -o build/waduk-unsigned.apk

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore build/key.jks \
            -alias waduk \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password \
            -keypass password \
            -dname "CN=Waduk Browser,O=Android,C=ID"

      - name: Align APK
        run: |
          zipalign -f 4 build/waduk-unsigned.apk build/waduk-aligned.apk

      - name: Sign APK
        run: |
          apksigner sign \
            --ks build/key.jks \
            --ks-pass pass:password \
            --key-pass pass:password \
            build/waduk-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waduk-browser
          path: build/waduk-aligned.apk      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waduk-browser
          path: build/waduk-aligned.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waduk-browser
          path: build/waduk-aligned.apk
