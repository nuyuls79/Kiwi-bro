name: Build Waduk Browser Plus Icon

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget unzip zipalign apksigner openjdk-11-jdk curl jq

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir -p build

      - name: Download latest Kiwi APK
        run: |
          # Gunakan repo yang benar: kiwibrowser/src.next (dengan titik)
          URL=$(curl -s https://api.github.com/repos/kiwibrowser/src.next/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          if [ -z "$URL" ]; then
            echo "Error: Tidak dapat menemukan APK di rilis terbaru kiwibrowser/src.next"
            exit 1
          fi
          
          echo "Mengunduh dari: $URL"
          wget -O build/kiwi.apk "$URL"

      - name: Extract APK
        run: |
          unzip build/kiwi.apk -d build/apk

      - name: Replace icon
        run: |
          if [ -f icon.png ]; then
            cp icon.png build/apk/res/mipmap-xxxhdpi-v4/ic_launcher.png || true
            cp icon.png build/apk/res/mipmap-xxhdpi-v4/ic_launcher.png || true
            cp icon.png build/apk/res/mipmap-xhdpi-v4/ic_launcher.png || true
          fi

      - name: Repack APK
        run: |
          cd build/apk
          zip -r ../waduk.apk .

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore build/key.jks \
            -alias waduk \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password \
            -keypass password \
            -dname "CN=Waduk Browser,O=Android,C=ID"

      - name: Align APK
        run: |
          zipalign -f 4 build/waduk.apk build/waduk-aligned.apk

      - name: Sign APK
        run: |
          apksigner sign \
            --ks build/key.jks \
            --ks-pass pass:password \
            --key-pass pass:password \
            build/waduk-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waduk-browser
          path: build/waduk-aligned.apk
